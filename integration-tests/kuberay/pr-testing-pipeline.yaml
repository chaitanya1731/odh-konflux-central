---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: odh-pr-test-kuberay
  annotations:
    pipelinesascode.tekton.dev/on-event: "[pull_request]"
    pipelinesascode.tekton.dev/on-target-branch: "[dev]"
spec:
  timeouts:
    pipeline: 2h
  pipelineSpec:
    description: |
      An integration test which provisions an ephemeral Hypershift cluster, deploys the KubeRay
      operator from the Konflux snapshot image via kustomize, and runs the e2e tests
      (Sanity + Tier1) directly from the PR branch source.
    params:
      - description: Snapshot of the application
        name: SNAPSHOT
        type: string
      - name: oci-artifacts-repo
        default: 'quay.io/opendatahub/odh-ci-artifacts'
        description: The OCI container used to store all test artifacts.
      - name: artifact-browser-url
        default: 'https://app-artifact-browser.apps.rosa.konflux-qe.zmr9.p3.openshiftapps.com'
        description: The URL for browsing test artifacts.
    tasks:
      - name: audit-snapshot
        params:
          - name: SNAPSHOT
            value: $(params.SNAPSHOT)
        taskSpec:
          params:
            - name: SNAPSHOT
              description: Snapshot of the application
          results:
          - name: pull-request-author
          - name: pull-request-number
          - name: git-repo
          - name: git-org
          - name: git-revision
          steps:
            - name: audit-snapshot
              image: quay.io/konflux-ci/konflux-test:stable
              workingDir: /workspace
              env:
                - name: SNAPSHOT
                  value: $(params.SNAPSHOT)
                - name: PR_AUTHOR
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['pac.test.appstudio.openshift.io/sender']
                - name: PR_NUMBER
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['pac.test.appstudio.openshift.io/pull-request']
                - name: GIT_REPO
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['pac.test.appstudio.openshift.io/url-repository']
                - name: GIT_ORG
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['pac.test.appstudio.openshift.io/url-org']
                - name: GIT_REVISION
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['pac.test.appstudio.openshift.io/sha']
              script: |
                #!/bin/bash
                set -e
                echo "SNAPSHOT=${SNAPSHOT}"

                while IFS= read -r row; do
                    COMPONENT_NAME=$(echo "$row" | base64 -d | jq -r '.name')
                    IMAGE=$(echo "$row" | base64 -d | jq -r '.containerImage')
                    GIT_COMMIT=$(echo "$row" | base64 -d | jq -r '.source.git.revision')
                    GIT_URL=$(echo "$row" | base64 -d | jq -r '.source.git.url')
                    echo "${COMPONENT_NAME} IMAGE: ${IMAGE}"
                    echo "GIT_COMMIT=${GIT_COMMIT}"
                    echo "GIT_URL=${GIT_URL}"
                done < <(echo "$SNAPSHOT" | jq -r '.components[] | @base64')

                echo -n "${PR_AUTHOR}" > "$(results.pull-request-author.path)"
                echo -n "${PR_NUMBER}" > "$(results.pull-request-number.path)"
                echo -n "${GIT_REPO}" > "$(results.git-repo.path)"
                echo -n "${GIT_ORG}" > "$(results.git-org.path)"
                echo -n "${GIT_REVISION}" > "$(results.git-revision.path)"

      - name: provision-eaas-space
        runAfter:
          - audit-snapshot
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/konflux-ci/build-definitions.git
            - name: revision
              value: main
            - name: pathInRepo
              value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
        params:
          - name: ownerName
            value: $(context.pipelineRun.name)
          - name: ownerUid
            value: $(context.pipelineRun.uid)

      - name: provision-cluster
        runAfter:
          - provision-eaas-space
        taskSpec:
          results:
            - name: clusterName
              value: "$(steps.create-cluster.results.clusterName)"
          steps:
            - name: get-supported-versions
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space.results.secretRef)
            - name: pick-version
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-latest-openshift-version-by-prefix/0.1/eaas-get-latest-openshift-version-by-prefix.yaml
              params:
                - name: prefix
                  value: "$(steps.get-supported-versions.results.versions[0])."
            - name: create-cluster
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space.results.secretRef)
                - name: version
                  value: "$(steps.pick-version.results.version)"
                - name: instanceType
                  value: m5.2xlarge

      - name: deploy-and-test
        timeout: 90m
        runAfter:
          - provision-cluster
        taskSpec:
          volumes:
            - name: credentials
              emptyDir: {}
            - name: test-status
              emptyDir: {}
          steps:
            - name: get-kubeconfig
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space.results.secretRef)
                - name: clusterName
                  value: "$(tasks.provision-cluster.results.clusterName)"
                - name: credentials
                  value: credentials
            - name: deploy-and-e2e
              image: quay.io/rhoai/rhoai-task-toolset:kuberay
              onError: continue
              computeResources:
                requests:
                  memory: "4Gi"
                  cpu: "2"
                limits:
                  memory: "8Gi"
                  cpu: "4"
              env:
                - name: KUBECONFIG
                  value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
                - name: SNAPSHOT
                  value: $(params.SNAPSHOT)
                - name: ARTIFACT_DIR
                  value: /workspace/artifacts-dir
              workingDir: /workspace/source
              volumeMounts:
                - name: credentials
                  mountPath: /credentials
                - name: test-status
                  mountPath: /test-status
              script: |
                #!/bin/bash
                set -e
                STATUS_FILE="/test-status/deploy-and-e2e-status"
                echo "failed" > "$STATUS_FILE"

                oc whoami
                oc get pods -A

                echo "SNAPSHOT=${SNAPSHOT}"

                # Extract operator image and git info from the Konflux snapshot
                KUBERAY_IMAGE=""
                KUBERAY_GIT_COMMIT=""
                KUBERAY_GIT_URL=""

                while IFS= read -r row; do
                  COMPONENT_NAME=$(echo "$row" | base64 -d | jq -r '.name')
                  IMAGE=$(echo "$row" | base64 -d | jq -r '.containerImage')
                  GIT_COMMIT=$(echo "$row" | base64 -d | jq -r '.source.git.revision')
                  GIT_URL=$(echo "$row" | base64 -d | jq -r '.source.git.url')

                  if echo "${GIT_URL}" | grep -qE '/kuberay(\.git)?$'; then
                    KUBERAY_IMAGE="${IMAGE}"
                    KUBERAY_GIT_COMMIT="${GIT_COMMIT}"
                    KUBERAY_GIT_URL="${GIT_URL}"
                  fi
                  echo "${COMPONENT_NAME} IMAGE: ${IMAGE} GIT_COMMIT: ${GIT_COMMIT}"
                done < <(echo "$SNAPSHOT" | jq -r '.components[] | @base64')

                echo "KUBERAY_IMAGE: ${KUBERAY_IMAGE}"
                echo "KUBERAY_GIT_URL: ${KUBERAY_GIT_URL}"
                echo "KUBERAY_GIT_COMMIT: ${KUBERAY_GIT_COMMIT}"

                mkdir -p "${ARTIFACT_DIR}"

                NAMESPACE="opendatahub"

                # Create target namespace
                oc create namespace ${NAMESPACE} --dry-run=client -o yaml | oc apply -f -

                # Clone kuberay at the PR commit for test source
                echo "Cloning kuberay at commit ${KUBERAY_GIT_COMMIT}..."
                mkdir kuberay_src
                git -C kuberay_src init
                git -C kuberay_src fetch "${KUBERAY_GIT_URL}" "${KUBERAY_GIT_COMMIT}" --depth=1
                git -C kuberay_src checkout FETCH_HEAD

                # Deploy the operator using the image built by the Konflux PR build pipeline
                echo "Deploying kuberay operator (image: ${KUBERAY_IMAGE})..."
                echo "namespace=${NAMESPACE}" > kuberay_src/ray-operator/config/openshift/params.env
                echo "odh-kuberay-operator-controller-image=${KUBERAY_IMAGE}" \
                  >> kuberay_src/ray-operator/config/openshift/params.env
                kubectl apply -k kuberay_src/ray-operator/config/openshift/ \
                  --server-side --force-conflicts
                oc rollout status deployment/kuberay-operator -n ${NAMESPACE} --timeout=300s

                # Run e2e tests directly from the cloned source
                echo "Running kuberay e2e tests..."
                cd kuberay_src/ray-operator
                cp images/tests/.env-odh .
                bash images/tests/run-tests.sh -testTier=Tier1 \
                  2>&1 | tee "${ARTIFACT_DIR}/its-tests.log"
                TEST_EXIT_CODE=${PIPESTATUS[0]}
                cp -r results "${ARTIFACT_DIR}/results" 2>/dev/null || true

                if [ "${TEST_EXIT_CODE}" != "0" ]; then
                  echo "Tests failed with exit code ${TEST_EXIT_CODE}"
                  exit 1
                fi

                echo "success" > "$STATUS_FILE"

            - name: must-gather
              onError: continue
              image: quay.io/rhoai/rhoai-task-toolset:kuberay
              env:
                - name: KUBECONFIG
                  value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
                - name: ARTIFACT_DIR
                  value: /workspace/artifacts-dir
              workingDir: /workspace/source
              volumeMounts:
                - name: credentials
                  mountPath: /credentials
              script: |
                NAMESPACE="opendatahub"
                mkdir -p "${ARTIFACT_DIR}/gather-kuberay"
                oc get rayclusters,rayjobs -A -o yaml \
                  > "${ARTIFACT_DIR}/gather-kuberay/ray-resources.yaml" 2>/dev/null || true
                oc get pods -n ${NAMESPACE} -o wide \
                  > "${ARTIFACT_DIR}/gather-kuberay/pods.txt" 2>/dev/null || true
                oc get events -n ${NAMESPACE} --sort-by='.lastTimestamp' \
                  > "${ARTIFACT_DIR}/gather-kuberay/events.txt" 2>/dev/null || true
                oc describe deployment/kuberay-operator -n ${NAMESPACE} \
                  > "${ARTIFACT_DIR}/gather-kuberay/operator-deployment.txt" 2>/dev/null || true
                oc logs deployment/kuberay-operator -n ${NAMESPACE} \
                  > "${ARTIFACT_DIR}/gather-kuberay/operator-logs.txt" 2>/dev/null || true

            - name: git-push-artifacts
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/secure-git-push/0.1/secure-git-push.yaml
              params:
                - name: source-path
                  value: /workspace/artifacts-dir
                - name: repo-path
                  value: 'opendatahub-io/odh-build-metadata'
                - name: repo-branch
                  value: 'ci-artifacts'
                - name: sparse-file-path
                  value: 'test-artifacts/docs'
                - name: dest-path
                  value: 'test-artifacts/$(context.pipelineRun.name)'
                - name: pipelinerun-name
                  value: $(context.pipelineRun.name)

            - name: check-test-exit-code
              image: alpine
              volumeMounts:
                - name: test-status
                  mountPath: /test-status
              script: |
                STATUS_FILE="/test-status/deploy-and-e2e-status"
                if ! [ -f "$STATUS_FILE" ] || [ "$(cat "$STATUS_FILE")" != "success" ]; then
                  echo "Failing pipeline because deploy-and-e2e step failed"
                  exit 1
                fi
                echo "deploy-and-e2e step succeeded"

    finally:
    - name: push-ci-artifacts-and-update-pr
      params:
        - name: oci-artifacts-repo
          value: $(params.oci-artifacts-repo)
        - name: pipeline-status
          value: $(tasks.status)
      taskSpec:
        volumes:
          - name: odh-registry-secret-volume
            secret:
              secretName: odh-registry-secret
              items:
              - key: .dockerconfigjson
                path: oci-storage-dockerconfigjson
        params:
          - name: oci-artifacts-repo
            description: oci-artifacts-repo
          - name: pipeline-status
            type: string
        steps:
          - name: pull-ci-artifacts
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/git-clone/0.1/git-clone.yaml
            params:
              - name: repo-path
                value: 'opendatahub-io/odh-build-metadata'
              - name: repo-branch
                value: 'ci-artifacts'
              - name: sparse-file-path
                value: 'test-artifacts/$(context.pipelineRun.name)'
              - name: dest-path
                value: /workspace/odh-ci-artifacts
              - name: artifacts-dir-path
                value: 'test-artifacts/$(context.pipelineRun.name)'
          - name: secure-push-oci
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/secure-push-oci/0.1/secure-push-oci.yaml
            params:
              - name: workdir-path
                value: '/workspace/odh-ci-artifacts/test-artifacts/$(context.pipelineRun.name)'
              - name: oci-ref
                value: $(params.oci-artifacts-repo):$(context.pipelineRun.name)
              - name: credentials-volume-name
                value: odh-registry-secret-volume
          - name: share-status-on-pull-request
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/pull-request-comment/0.1/pull-request-comment.yaml
            params:
              - name: test-name
                value: $(context.pipelineRun.name)
              - name: oci-container
                value: $(params.oci-artifacts-repo):$(context.pipelineRun.name)
              - name: pipeline-aggregate-status
                value: $(params.pipeline-status)
              - name: pull-request-author
                value: $(tasks.audit-snapshot.results.pull-request-author)
              - name: pull-request-number
                value: $(tasks.audit-snapshot.results.pull-request-number)
              - name: git-repo
                value: $(tasks.audit-snapshot.results.git-repo)
              - name: git-org
                value: $(tasks.audit-snapshot.results.git-org)
              - name: git-revision
                value: $(tasks.audit-snapshot.results.git-revision)
              - name: artifact-browser-url
                value: $(params.artifact-browser-url)
          - name: cleanup-artifacts-from-git
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/cleanup-git-repo/0.1/cleanup-git-repo.yaml
            params:
              - name: work-dir
                value: '/workspace/odh-ci-artifacts'
              - name: artifacts-dir-path
                value: 'test-artifacts'
              - name: dir-to-be-deleted
                value: '$(context.pipelineRun.name)'
