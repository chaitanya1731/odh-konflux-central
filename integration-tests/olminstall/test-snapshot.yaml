---
# Manual test Snapshot for olminstall smoke scenario.
# Creates a Snapshot to trigger the ITS pipeline without waiting for a real build.
#
# Prerequisites:
#   1. The ITS CR must already be applied:
#      oc apply -n rhoai-tenant -f integration-tests/olminstall/its-olminstall-rhoai-tenant.yaml
#
# Usage:
#   oc create -n rhoai-tenant -f integration-tests/olminstall/test-snapshot.yaml
#
# To always use the very latest Konflux-built image, run this first:
#   LATEST=$(oc get snapshots -n rhoai-tenant \
#     --sort-by=.metadata.creationTimestamp \
#     -l appstudio.openshift.io/application=rhoai-fbc-fragment-ocp-421 \
#     -o jsonpath='{.items[-1].spec.components[0].containerImage}')
#   sed "s|containerImage:.*|containerImage: $LATEST|" \
#     integration-tests/olminstall/test-snapshot.yaml | oc create -n rhoai-tenant -f -
#
# After creation, Konflux detects the Snapshot and triggers a PipelineRun for
# every matching ITS. Watch the run:
#   oc get pipelineruns -n rhoai-tenant | grep olminstall
#   or via the Konflux UI:
#   https://konflux-ui.apps.<cluster-domain>/ns/rhoai-tenant/applications/testops-playpen/activity/pipelineruns
apiVersion: appstudio.redhat.com/v1alpha1
kind: Snapshot
metadata:
  generateName: test-olminstall-snap-
  namespace: rhoai-tenant
spec:
  application: testops-playpen
  components:
    - name: rhoai-fbc-fragment-ocp-421
      containerImage: quay.io/rhoai/rhoai-fbc-fragment@sha256:ab0042e79c995ace875bf5624c6a7e98fe082c833b39bbc0ea9b0c16399496a9
